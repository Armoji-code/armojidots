# ── armojidots · starship ───────────────────────────
# Clean single-line prompt: dir, git, duration.

add_newline = true
format = "$directory$git_branch$git_status$cmd_duration$line_break$character"

[directory]
style = "bold cyan"
truncation_length = 3
truncate_to_repo = true

[git_branch]
symbol = " "
style = "purple"

[git_status]
style = "yellow"

[cmd_duration]
min_time = 2000
format = "took [$duration]($style) "
style = "dimmed white"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
