# ── Keybinds ────────────────────────────────────────

# Apps
bindsym $mod+t exec $term
bindsym $mod+e exec $files

# Spotlight (walker): SHORT tap of Win toggles; holding (drag/resize) is ignored
bindsym --no-repeat Super_L exec ~/.config/sway/scripts/super-tap.sh down
bindsym --release Super_L exec ~/.config/sway/scripts/super-tap.sh up

# Window controls
bindsym $mod+q kill
bindsym $mod+space floating toggle
bindsym $mod+f fullscreen toggle

# Lock screen
bindsym $mod+l exec swaylock -f

# Notification center
bindsym $mod+n exec swaync-client -t

# Quick-access sidebar terminals (toggle shows/hides, never kills)
bindsym $mod+r exec ~/.config/sway/scripts/sidebar.sh term
bindsym $mod+Shift+r exec ~/.config/sway/scripts/sidebar.sh claude

# Screenshot: select a region → clipboard only + notification
bindsym $mod+Shift+s exec sh -c 'grim -g "$(slurp)" - | wl-copy && notify-send -t 3000 "󰹑 Screenshot" "Region copied to clipboard"'

# Hold Win + left-drag to move windows, Win + right-drag to resize
floating_modifier $mod normal
