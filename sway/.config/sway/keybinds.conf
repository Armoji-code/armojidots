# ── Keybinds ────────────────────────────────────────

# Apps
bindsym $mod+t exec $term
bindsym $mod+e exec $files

# Spotlight (walker): tap Win alone to toggle
bindsym --release Super_L exec walker

# Window controls
bindsym $mod+q kill
bindsym $mod+space floating toggle
bindsym $mod+f fullscreen toggle

# Screenshot: select a region → clipboard only + notification
bindsym $mod+Shift+s exec sh -c 'grim -g "$(slurp)" - | wl-copy && notify-send -t 3000 "󰹑 Screenshot" "Region copied to clipboard"'

# Hold Win + left-drag to move windows, Win + right-drag to resize
floating_modifier $mod normal
