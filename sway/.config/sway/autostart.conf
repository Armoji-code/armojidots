# ── Autostart ───────────────────────────────────────
# Things that launch with the session.

# Hand the session environment to systemd user services (they need
# WAYLAND_DISPLAY to show GUI), then (re)start them with it:
#   elephant = launcher data backend, walker = resident launcher frontend.
# Restarting here guarantees they come up with the session environment;
# both units are also WantedBy=graphical-session.target and Restart=on-failure.
exec 'systemctl --user import-environment WAYLAND_DISPLAY DISPLAY SWAYSOCK XDG_CURRENT_DESKTOP XDG_SESSION_TYPE; dbus-update-activation-environment --systemd WAYLAND_DISPLAY DISPLAY XDG_CURRENT_DESKTOP; systemctl --user restart elephant walker'

exec autotiling
exec waybar
exec ~/.config/nwg-dock/dock.sh
exec swaync
# walker frontend runs as a systemd user service (started in the env-import
# line above) so it stays resident — the launcher window opens instantly.
# idle policy lives in swayidle/config (auto-discovered): 5m lock, 10m screen off
exec swayidle -w
# "current" is a symlink updated by spotlight's /set wallpaper
exec swaybg -i ~/dotfiles/wallpapers/current -m fill
