# ── Autostart ───────────────────────────────────────
# Things that launch with the session.

# Hand the session environment to systemd user services (elephant needs
# WAYLAND_DISPLAY to launch GUI apps), then restart elephant with it
exec 'systemctl --user import-environment WAYLAND_DISPLAY DISPLAY SWAYSOCK XDG_CURRENT_DESKTOP XDG_SESSION_TYPE; dbus-update-activation-environment --systemd WAYLAND_DISPLAY DISPLAY XDG_CURRENT_DESKTOP; systemctl --user restart elephant'

exec waybar
exec ~/.config/nwg-dock/dock.sh
exec swaync
exec walker --gapplication-service
# idle policy lives in swayidle/config (auto-discovered): 5m lock, 10m screen off
exec swayidle -w
# "current" is a symlink updated by spotlight's /set wallpaper
exec swaybg -i ~/dotfiles/wallpapers/current -m fill
