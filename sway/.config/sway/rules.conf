# ── Window rules ────────────────────────────────────

# Floating glass terminals for TUI tools (nmtui, bluetuith, …)
for_window [app_id="float-tui"] floating enable, resize set 900 px 620 px, move position center

# Sidebar terminals: tall left panel below the bar, scratchpad-backed
for_window [app_id="sidebar-term"] floating enable, sticky enable, resize set 480 px 1014 px, move scratchpad, scratchpad show, move position 0 0
for_window [app_id="sidebar-claude"] floating enable, sticky enable, resize set 480 px 1014 px, move scratchpad, scratchpad show, move position 0 0

# GTK apps join the glass: slight transparency + SwayFX blur behind
for_window [app_id="nemo"] opacity 0.93
for_window [app_id="org.pulseaudio.pavucontrol"] opacity 0.93

# Monitor config (nwg-displays): floats + centers instead of tiling in, and
# focuses right here at map time (a follow-up `swaymsg … focus` from the
# launching script races the window actually mapping and unreliably no-ops)
for_window [app_id="nwg-displays"] floating enable, resize set 900 px 650 px, move position center, focus

# Spotlight launcher. The search bar is a LAYER-SHELL surface (a normal window
# can't be a true capsule — SwayFX clamps its corner_radius); its glass is set
# by the "spotlight-search" layer_effects rule in effects.conf. The content
# panel below is a normal floating window (keeps the open/close animation),
# filled by one translucent pill so corner_radius clips its blur to the pill.
for_window [app_id="org.armojidots.Spotlight" title="spotlight-list"] floating enable, border none, blur enable, shadows disable, corner_radius 10
