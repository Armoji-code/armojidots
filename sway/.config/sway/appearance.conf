# ── Appearance ──────────────────────────────────────
# Borders, gaps, colors, and (later) SwayFX effects.

# Thin visible border so windows can be seen on the empty background
default_border pixel 2

# Fibonacci / dwindle tiling is handled by `autotiling` (see autostart.conf):
# it flips each new split to the focused window's longer axis, so windows
# spiral instead of stacking. sway has no native spiral layout.

# Gaps: windows float away from screen edges and each other.
# Edge total = inner + outer = 12px, matching the bar's side margins.
gaps inner 10
gaps outer 2

# Window border colors — generated by scripts/theme.sh (/set color)
include ~/.config/sway/colors.conf
