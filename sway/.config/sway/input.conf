# ── Input ───────────────────────────────────────────

# Touchpad: Windows-style scrolling (down motion scrolls up),
# tap-to-click left as hardware default
input type:touchpad {
    natural_scroll enabled
    dwt disabled
}

# Mice: classic wheel (wheel down = page down), like Windows
input type:pointer {
    natural_scroll disabled
}

# Cursor theme (Bibata-Modern-Classic) — sets it for native Wayland clients;
# XCURSOR_THEME/SIZE (environment.d/cursor.conf) covers X11/XWayland apps and
# anything reading the env instead of the seat.
seat seat0 xcursor_theme Bibata-Modern-Classic 24
