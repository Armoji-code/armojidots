# ── Workspaces ──────────────────────────────────────
# Per-monitor workspace groups via swaysome:
# each output gets its own 1-10 (named 11-19/110, 21-29/210, …).
# Win+N switches on the focused monitor only.

# Initialize groups when sway starts
exec swaysome init 1

# Switch to workspace N on the focused monitor
bindsym $mod+1 exec swaysome focus 1
bindsym $mod+2 exec swaysome focus 2
bindsym $mod+3 exec swaysome focus 3
bindsym $mod+4 exec swaysome focus 4
bindsym $mod+5 exec swaysome focus 5
bindsym $mod+6 exec swaysome focus 6
bindsym $mod+7 exec swaysome focus 7
bindsym $mod+8 exec swaysome focus 8
bindsym $mod+9 exec swaysome focus 9
bindsym $mod+0 exec swaysome focus 10

# Move focused window to workspace N on its monitor, and follow it
bindsym $mod+Shift+1 exec 'swaysome move 1 && swaysome focus 1'
bindsym $mod+Shift+2 exec 'swaysome move 2 && swaysome focus 2'
bindsym $mod+Shift+3 exec 'swaysome move 3 && swaysome focus 3'
bindsym $mod+Shift+4 exec 'swaysome move 4 && swaysome focus 4'
bindsym $mod+Shift+5 exec 'swaysome move 5 && swaysome focus 5'
bindsym $mod+Shift+6 exec 'swaysome move 6 && swaysome focus 6'
bindsym $mod+Shift+7 exec 'swaysome move 7 && swaysome focus 7'
bindsym $mod+Shift+8 exec 'swaysome move 8 && swaysome focus 8'
bindsym $mod+Shift+9 exec 'swaysome move 9 && swaysome focus 9'
bindsym $mod+Shift+0 exec 'swaysome move 10 && swaysome focus 10'
