# ── SwayFX effects ──────────────────────────────────
# The eye candy. Kept modest for battery (Renoir iGPU);
# blur only shows behind transparent surfaces.

# Rounded corners — always on: with gaps, even a lone window
# floats and deserves them (fullscreen still stays square)
corner_radius 10
smart_corner_radius off

# Shadows
shadows enable
shadow_blur_radius 18
shadow_color #00000070
shadow_inactive_color #00000040

# Slightly dim unfocused windows
default_dim_inactive 0.08

# Blur (visible once surfaces have transparency)
blur enable
blur_passes 2
blur_radius 4

# Bar: transparent strip with pill groups — blur only under the pills
# (blur_ignore_transparent skips the empty gaps between them),
# no layer shadow (it would box the whole strip, not the pills)
layer_effects "waybar" blur enable; blur_ignore_transparent enable; shadows disable; corner_radius 0

# Walker (Spotlight): same glass as the bar pills
layer_effects "walker" blur enable; shadows enable; corner_radius 14

# swaync notifications + control center: same glass
layer_effects "swaync-notification-window" blur enable; blur_ignore_transparent enable; shadows disable; corner_radius 14
layer_effects "swaync-control-center" blur enable; blur_ignore_transparent enable; shadows disable; corner_radius 14

# Known-buggy upstream — keep off
scratchpad_minimize disable
