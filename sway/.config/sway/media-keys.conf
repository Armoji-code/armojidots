# ── Media / function keys ───────────────────────────
# Hardware Fn keys. --locked so they keep working on the lock screen.

# Volume (wpctl / wireplumber), capped at 100% — routed through osd.sh so the
# armoji-osd pill pops up (Windows-11-style), works over fullscreen apps too
bindsym --locked XF86AudioRaiseVolume exec ~/.config/sway/scripts/osd.sh volume-up
bindsym --locked XF86AudioLowerVolume exec ~/.config/sway/scripts/osd.sh volume-down
bindsym --locked XF86AudioMute        exec ~/.config/sway/scripts/osd.sh mute-toggle
bindsym --locked XF86AudioMicMute     exec wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Brightness (brightnessctl)
bindsym --locked XF86MonBrightnessUp   exec ~/.config/sway/scripts/osd.sh brightness-up
bindsym --locked XF86MonBrightnessDown exec ~/.config/sway/scripts/osd.sh brightness-down

# Playback (playerctl)
bindsym --locked XF86AudioPlay  exec playerctl play-pause
bindsym --locked XF86AudioPause exec playerctl play-pause
bindsym --locked XF86AudioNext  exec playerctl next
bindsym --locked XF86AudioPrev  exec playerctl previous
bindsym --locked XF86AudioStop  exec playerctl stop
