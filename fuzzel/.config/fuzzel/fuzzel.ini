# ── armojidots · fuzzel ─────────────────────────────
# Glass style matching the waybar pills; compact macOS-ish dropdown.
# Position (anchor/margins) is set per-use by the caller scripts.

font=JetBrainsMono Nerd Font:size=11
terminal=foot -e
layer=overlay
lines=8
width=30
horizontal-pad=14
vertical-pad=10
inner-pad=8
# don't vanish when focus-follows-mouse steals keyboard focus
exit-on-keyboard-focus-loss=no

[colors]
background=12141ae6
text=dcdfe4ff
prompt=8a8f98ff
input=dcdfe4ff
match=e5c07bff
selection=ffffff26
selection-text=ffffffff
selection-match=e5c07bff
border=00000000

[border]
width=0
radius=14
